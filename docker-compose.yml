services:
  # PostgreSQL database for metadata, audit logs, job queue state
  postgres:
    image: postgres:15-alpine
    container_name: tc-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-tc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tc_password}
      POSTGRES_DB: ${DB_NAME:-traffic_count}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tc-network

  # Redis queue for job orchestration
  redis:
    image: redis:7-alpine
    container_name: tc-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tc-network

  # FastAPI backend service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tc-backend
    environment:
      DEBUG: ${DEBUG:-0}
      DB_URL: postgresql://${DB_USER:-tc_user}:${DB_PASSWORD:-tc_password}@postgres:5432/${DB_NAME:-traffic_count}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-prod}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      YANDEX_MOUNT_PATH: ${YANDEX_MOUNT_PATH:-/mnt/yandex}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - parquet-store:/app/parquet_store
      - yandex-mount:/mnt/yandex:ro
    networks:
      - tc-network
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  # Streamlit frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tc-frontend
    environment:
      DEBUG: ${DEBUG:-0}
      BACKEND_URL: http://backend:8000
      STREAMLIT_SERVER_RUNONCACHEDSCRIPTCHANGE: true
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
    networks:
      - tc-network
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0

  # GPU Worker pool (NVIDIA runtime required)
  # Note: Scale with docker-compose up --scale worker=N (or define multiple in compose)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: tc-worker-1
    environment:
      DEBUG: ${DEBUG:-0}
      DB_URL: postgresql://${DB_USER:-tc_user}:${DB_PASSWORD:-tc_password}@postgres:5432/${DB_NAME:-traffic_count}
      REDIS_URL: redis://redis:6379
      YOLO_CONFIG_PATH: /app/config/yolo_config.json
      GPU_DEVICE: ${GPU_DEVICE:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - parquet-store:/app/parquet_store
      - ./worker/config/yolo_config.json:/app/config/yolo_config.json:ro
      - yandex-mount:/mnt/yandex:ro
    networks:
      - tc-network
    # GPU isolation: reserve specific GPU device
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  # Yandex Disk Watcher service
  watcher:
    build:
      context: .
      dockerfile: Dockerfile.watcher
    container_name: tc-watcher
    environment:
      DEBUG: ${DEBUG:-0}
      YANDEX_MOUNT_PATH: ${YANDEX_MOUNT_PATH:-/mnt/yandex}
      BACKEND_URL: http://backend:8000
      DB_URL: postgresql://${DB_USER:-tc_user}:${DB_PASSWORD:-tc_password}@postgres:5432/${DB_NAME:-traffic_count}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - yandex-mount:/mnt/yandex:ro
    networks:
      - tc-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  parquet-store:
    driver: local
  yandex-mount:
    driver: local

networks:
  tc-network:
    driver: bridge
